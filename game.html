<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juegos de Previa</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --bg:#0f0f13; --surface:#1a1a24; --card-bg:#1f1f2e; --accent:#ff3d6e; --accent2:#ff7043; --gold:#ffd700; --text:#f0f0f0; --muted:#888; --border:#2e2e40; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; min-height:100dvh; display:flex; align-items:center; justify-content:center; }
#app { width:100%; max-width:480px; min-height:100dvh; }
.screen { display:none; flex-direction:column; min-height:100dvh; padding:24px 20px; animation:fadeIn .25s ease; }
.screen.active { display:flex; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
#home-screen { align-items:center; justify-content:center; gap:12px; text-align:center; }
.logo { font-size:72px; margin-bottom:4px; }
#home-screen h1 { font-size:2rem; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.subtitle { color:var(--muted); font-size:.95rem; margin-bottom:12px; }
.game-grid { display:flex; flex-direction:column; gap:12px; width:100%; margin-top:8px; }
.game-card { display:flex; align-items:center; gap:16px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:20px; cursor:pointer; transition:transform .15s,border-color .15s; text-align:left; width:100%; color:var(--text); }
.game-card:active { transform:scale(.98); border-color:var(--accent); }
.game-card.locked { opacity:.4; cursor:not-allowed; }
.game-icon { font-size:2rem; }
.game-name { font-size:1.1rem; font-weight:700; display:block; }
.game-desc { font-size:.8rem; color:var(--muted); display:block; }
#setup-screen h2 { font-size:1.6rem; font-weight:800; margin:16px 0 4px; }
.setup-subtitle { color:var(--muted); margin-bottom:20px; }
.back-btn { background:none; border:none; color:var(--muted); font-size:.95rem; cursor:pointer; padding:4px 0; align-self:flex-start; }
.players-setup { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
.player-input-row { display:flex; gap:8px; align-items:center; }
.player-input { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:1rem; outline:none; }
.player-input:focus { border-color:var(--accent); }
.remove-player { background:none; border:1px solid var(--border); border-radius:8px; color:var(--muted); padding:10px 12px; cursor:pointer; font-size:.9rem; }
.add-player-btn { background:none; border:1px dashed var(--border); border-radius:10px; color:var(--muted); padding:12px; cursor:pointer; font-size:.95rem; }
.category-select { margin-bottom:28px; }
.category-select p { color:var(--muted); margin-bottom:10px; font-size:.9rem; }
.category-btns { display:flex; gap:8px; }
.cat-btn { flex:1; padding:10px 6px; border-radius:10px; border:1px solid var(--border); background:var(--surface); color:var(--muted); font-size:.85rem; cursor:pointer; font-weight:600; }
.cat-btn.active { border-color:var(--accent); color:var(--text); background:#2a1a22; }
.start-btn { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none; border-radius:14px; padding:16px; font-size:1.1rem; font-weight:800; cursor:pointer; width:100%; }
.start-btn:active { opacity:.85; }
.secondary-btn { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:14px; padding:14px; font-size:1rem; font-weight:600; cursor:pointer; width:100%; }
.game-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.card-counter { font-size:.85rem; color:var(--muted); }
.turn-indicator { text-align:center; font-size:.9rem; color:var(--muted); margin-bottom:20px; }
.turn-indicator span { color:var(--accent); font-weight:700; }
.card-area { margin-bottom:20px; }
.card { background:linear-gradient(145deg,#25253a,#1a1a2e); border:1px solid #3a3a55; border-radius:20px; padding:36px 24px; min-height:200px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; box-shadow:0 8px 32px rgba(255,61,110,.15); }
.card-label { font-size:.7rem; font-weight:800; letter-spacing:3px; color:var(--accent); margin-bottom:16px; text-transform:uppercase; }
.card-text { font-size:1.25rem; font-weight:700; line-height:1.5; }
@keyframes flipIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
.card.flip { animation:flipIn .3s ease; }
.drink-prompt { text-align:center; color:var(--muted); font-size:.9rem; margin-bottom:16px; }
.drink-prompt strong { color:var(--accent2); }
.scoreboard { background:var(--surface); border-radius:14px; border:1px solid var(--border); padding:14px; margin-bottom:16px; }
.drink-label { font-size:.8rem; color:var(--muted); margin-bottom:10px; text-align:center; }
.drink-chips { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:14px; }
.drink-chip { padding:10px 16px; border-radius:20px; border:1px solid var(--border); background:var(--card-bg); color:var(--text); font-size:.9rem; cursor:pointer; }
.drink-chip:active { border-color:var(--accent); background:#2a1822; transform:scale(.95); }
.scores-list { display:flex; flex-direction:column; gap:4px; }
.score-row { display:flex; justify-content:space-between; align-items:center; padding:4px 2px; font-size:.85rem; }
.score-name { color:var(--muted); }
.score-count { font-weight:700; color:var(--accent2); }
.next-btn { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none; border-radius:14px; padding:16px; font-size:1rem; font-weight:700; cursor:pointer; width:100%; }
.next-btn:active { opacity:.85; }
.game-actions { width:100%; }
#end-screen { justify-content:center; align-items:center; text-align:center; }
.end-content { width:100%; display:flex; flex-direction:column; align-items:center; gap:14px; }
.trophy { font-size:5rem; }
#end-screen h2 { font-size:1.8rem; font-weight:800; }
#end-screen p { color:var(--muted); font-size:.95rem; }
.winner { font-size:1.2rem; font-weight:800; color:var(--gold); background:#1e1a00; border:1px solid #4a4000; border-radius:12px; padding:12px 24px; }
.final-scores { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; width:100%; }
.final-score-row { display:flex; justify-content:space-between; align-items:center; padding:8px 4px; font-size:.95rem; border-bottom:1px solid var(--border); }
.final-score-row:last-child { border-bottom:none; }
.rank { font-size:1.1rem; }
.end-actions { display:flex; flex-direction:column; gap:10px; width:100%; }
@media(max-width:380px){ .card-text{font-size:1.1rem} #home-screen h1{font-size:1.7rem} }
  </style>
</head>
<body>
<div id="app">
  <div id="home-screen" class="screen active">
    <div class="logo">🍻</div>
    <h1>Juegos de Previa</h1>
    <p class="subtitle">Elige tu juego</p>
    <div class="game-grid">
      <button class="game-card" onclick="goToGame('yo-nunca')">
        <span class="game-icon">🔥</span>
        <div><span class="game-name">Yo Nunca</span><span class="game-desc">Picante</span></div>
      </button>
      <button class="game-card locked">
        <span class="game-icon">🎲</span>
        <div><span class="game-name">Verdad o Reto</span><span class="game-desc">Próximamente</span></div>
      </button>
      <button class="game-card locked">
        <span class="game-icon">🃏</span>
        <div><span class="game-name">Carta de Tragos</span><span class="game-desc">Próximamente</span></div>
      </button>
    </div>
  </div>
  <div id="setup-screen" class="screen">
    <button class="back-btn" onclick="goHome()">← Volver</button>
    <h2>Yo Nunca 🔥</h2>
    <p class="setup-subtitle">¿Cuántos jugadores son?</p>
    <div class="players-setup">
      <div id="player-list"></div>
      <button class="add-player-btn" onclick="addPlayer()">+ Agregar jugador</button>
    </div>
    <div class="category-select">
      <p>Nivel de picante:</p>
      <div class="category-btns">
        <button class="cat-btn active" data-cat="medium" onclick="selectCategory(this)">🌶️ Atrevido</button>
        <button class="cat-btn" data-cat="hot" onclick="selectCategory(this)">🔥 Picante</button>
        <button class="cat-btn" data-cat="extreme" onclick="selectCategory(this)">💀 Extremo</button>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">¡Empezar!</button>
  </div>
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="back-btn" onclick="goHome()">✕</button>
      <div class="card-counter" id="card-counter">Carta 1/20</div>
    </div>
    <div class="turn-indicator" id="turn-indicator">Turno de <span id="current-player"></span></div>
    <div class="card-area">
      <div class="card" id="main-card">
        <div class="card-label">YO NUNCA...</div>
        <div class="card-text" id="card-text"></div>
      </div>
    </div>
    <div class="drink-prompt">¿Alguna vez lo hiciste? <strong>¡Tomá!</strong> 🍺</div>
    <div class="scoreboard" id="scoreboard"></div>
    <div class="game-actions">
      <button class="next-btn" onclick="nextCard()">Siguiente →</button>
    </div>
  </div>
  <div id="end-screen" class="screen">
    <div class="end-content">
      <div class="trophy">🏆</div>
      <h2>¡Juego terminado!</h2>
      <p>El más picante fue:</p>
      <div class="winner" id="winner-name"></div>
      <div class="final-scores" id="final-scores"></div>
      <div class="end-actions">
        <button class="start-btn" onclick="restartGame()">Jugar de nuevo</button>
        <button class="secondary-btn" onclick="goHome()">Menú principal</button>
      </div>
    </div>
  </div>
</div>
<script>
const CARDS = {
  medium: ["mandé un mensaje al ex a las 3am","me hice el dormido para no contestar el teléfono","besé a alguien en una previa sin saber su nombre","mentí sobre mi edad","stalkié el Instagram de alguien durante más de una hora","mandé un audio por error a quien no era","hice ghosting a alguien que me gustaba","dije 'ya llego' cuando ni me había bañado","borré un mensaje y lo reescribí cinco veces","tuve un crush con el/la mejor amigo/a de mi amigo/a","mentí que estaba enfermo para no salir","le escribí a alguien borracho y lo negué al otro día","besé a dos personas en la misma noche","tuve un sueño con alguien de este grupo","revisé el teléfono de mi pareja sin permiso","terminé algo con alguien solo por WhatsApp","tuve un crush secreto con alguien de este grupo","lloré viendo una peli de Disney","usé a alguien para darle celos a otro","me inventé planes para no salir con alguien"],
  hot: ["mandé una foto picante por error","tuve relaciones en la casa de mis viejos","tuve más de tres personas al mismo tiempo","me desperté sin saber dónde estaba","salí sin ropa interior porque no encontraba limpia","tuve relaciones con alguien del grupo de amigos","besé a alguien de este grupo","tuve relaciones en un lugar público","me bañé con alguien sin que fuera mi pareja","usé una excusa para quedarme a dormir en lo de alguien","tuve sentimientos por alguien de este grupo","mentí sobre cuántas personas besé","tuve una noche de una sola vez y lo repetí","me atraparon mirando el cuerpo de alguien de este grupo","me gustó alguien de este grupo más de lo que admití","tuve relaciones con alguien que conocí ese mismo día","me arrepentí de alguien al día siguiente","mandé una foto de mí mismo que no debía","tuve relaciones con alguien más de diez años mayor","hice el lindo borracho para que me lleven a casa"],
  extreme: ["tuve una fantasía con alguien de este grupo","tuve relaciones siendo pareja de otra persona","mandé fotos íntimas que luego lamenté","hice algo sexual donde me podían ver","tuve relaciones con dos personas del mismo grupo de amigos","tuve una cita doble sin que los otros supieran","tuve relaciones y después dije que no pasó nada","tuve relaciones en la misma cama donde había alguien durmiendo","mandé un mensaje sexual sin querer a un familiar","tuve sentimientos por la pareja de un amigo/a","hice algo en una fiesta que prometí nunca contar","tuve relaciones con alguien cuyo nombre no recuerdo","mentí sobre dónde estaba para estar con alguien","tuve un rol o juego de fantasía","alguien me vio en una situación comprometida y nunca lo hablamos","hice algo de lo que me arrepiento cada vez que lo recuerdo","tuve más de cinco personas en el mismo mes","hice un striptease aunque sea para mí solo/a","tuve relaciones con alguien del trabajo o la facultad","usé a alguien para ponerle celos a otro"]
};
let players=[],scores={},cards=[],cardIdx=0,playerIdx=0,category='medium';
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){showScreen('home-screen');}
function goToGame(g){if(g==='yo-nunca'){players=[];showScreen('setup-screen');addPlayer();addPlayer();}}
function addPlayer(){players.push({name:`Jugador ${players.length+1}`});renderPlayers();}
function removePlayer(i){if(players.length<=2)return;players.splice(i,1);renderPlayers();}
function renderPlayers(){document.getElementById('player-list').innerHTML=players.map((p,i)=>`<div class="player-input-row"><input class="player-input" type="text" value="${p.name}" placeholder="Nombre" oninput="players[${i}].name=this.value||'Jugador ${i+1}'"/>${players.length>2?`<button class="remove-player" onclick="removePlayer(${i})">✕</button>`:''}</div>`).join('');}
function selectCategory(btn){document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');category=btn.dataset.cat;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startGame(){players=players.map(p=>({name:p.name||'Jugador'}));scores={};players.forEach(p=>scores[p.name]=0);cards=shuffle([...CARDS[category]]).slice(0,20);cardIdx=0;playerIdx=0;renderCard();renderScoreboard();showScreen('game-screen');}
function renderCard(){document.getElementById('card-text').textContent=cards[cardIdx];document.getElementById('turn-indicator').innerHTML=`Turno de <span>${players[playerIdx].name}</span>`;document.getElementById('card-counter').textContent=`Carta ${cardIdx+1}/${cards.length}`;const c=document.getElementById('main-card');c.classList.remove('flip');void c.offsetWidth;c.classList.add('flip');}
function renderScoreboard(){const sorted=[...players].sort((a,b)=>scores[b.name]-scores[a.name]);document.getElementById('scoreboard').innerHTML=`<p class="drink-label">¿Quién tomó? (tocá su nombre)</p><div class="drink-chips">${players.map(p=>`<button class="drink-chip" onclick="drink('${p.name}')">${p.name} 🍺</button>`).join('')}</div><div class="scores-list">${sorted.map(p=>`<div class="score-row"><span class="score-name">${p.name}</span><span class="score-count">${scores[p.name]} tragos</span></div>`).join('')}</div>`;}
function drink(name){scores[name]=(scores[name]||0)+1;renderScoreboard();}
function nextCard(){cardIdx++;playerIdx=(playerIdx+1)%players.length;if(cardIdx>=cards.length){endGame();return;}renderCard();}
function endGame(){const sorted=[...players].sort((a,b)=>scores[b.name]-scores[a.name]);document.getElementById('winner-name').textContent=`🍺 ${sorted[0].name} (${scores[sorted[0].name]} tragos)`;document.getElementById('final-scores').innerHTML=sorted.map((p,i)=>`<div class="final-score-row"><span class="rank">${['🥇','🥈','🥉'][i]||i+1+'.'}</span><span>${p.name}</span><span>${scores[p.name]} tragos</span></div>`).join('');showScreen('end-screen');}
function restartGame(){startGame();}
</script>
</body>
</html>
